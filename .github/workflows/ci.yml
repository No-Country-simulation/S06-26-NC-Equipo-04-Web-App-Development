name: CI Pipeline - Verificación de Código

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-check:
    name: Compilar y Verificar
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: 📦 Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 🛠️ Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Verificar compilación (TypeScript)
        # Esto ejecuta el script build de tu package.json para asegurar que no hay errores de tipado
        run: pnpm run build